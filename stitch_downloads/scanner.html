<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .qr-viewfinder-overlay {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
        }
        .corner-guide {
            width: 40px;
            height: 40px;
            border-color: #96ae91;
            border-width: 4px;
        }
        .scanning-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #96ae91, transparent);
            box-shadow: 0 0 15px #96ae91;
            top: 20%;
        }
    </style>
<style data-stitch-cursor=""></style><style data-stitch-scroll-lock=""></style></head>
<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="flex justify-between items-center px-margin-mobile h-16 w-full bg-surface z-50">
<div class="flex items-center gap-3">
<img alt="AttendWise Logo" class="h-8 w-auto" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBXMPpsKadhXRdMGAaylAbciwThbrekMR581REsE_psWSVb14M54V88_ZJyTWfO8Meh_8VoxOZLVv20v8KyfftzhN2AKZCpcQYzyVgWZYJR8oIhFd0GhVorY4tudLqPy5KwtGI238RgSr-DZKV7cTo4ADwEe59WBzbwmvkwGUEXaFQ-6sF2bm39GjVCpBvsuIGq7cR6uFyPlcYGT5sN0XB2RgaJNyoR7rGDVoPNTZGp-fy4DOcdOPm-OqVaurSTXe6MtAeQJpeVqcB3">
<h1 class="font-headline-md text-headline-md font-bold text-primary">AttendWise</h1>
</div>
<div class="w-10 h-10 rounded-full overflow-hidden bg-surface-container-high flex items-center justify-center border border-outline-variant">
<span class="material-symbols-outlined text-on-surface-variant">person</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 relative flex flex-col items-center justify-center overflow-hidden">
<!-- Live Camera Feed Simulation Background -->
<div class="absolute inset-0 z-0 bg-neutral-900 overflow-hidden">
<div class="w-full h-full opacity-60 bg-center bg-cover" data-alt="A blurred background perspective of a modern university lecture hall with rows of wooden desks and soft architectural lighting. The scene is filtered with a dark, atmospheric overlay to make the foreground UI elements pop. The mood is professional and academic, featuring subtle forest green undertones consistent with a sophisticated design system." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBCZR_TITrfZ8ZBXZr7WHuSK7XIyQu2c2pKA8ED0WoLmre9eS-6_GMe-XRyifDOFqk2Xe1DaN2LEbPPCbH1_NkAME0-jnvrBifUc0-lU_-RZIV8ltaJg-aaw-Qxinpl9cyg8Pr-AqbOINmubWlIVWzFg1Fli0fiEmgiWwd6LdPi_G16p7tTAYfr9DGoMLDZIiYYdtms1zZI_H_fhYSCGkoNX5-rbTkpLg6vto4ME5FkIhHs27W_b1TqNQ_2HaOlj5_AWlnMP1z3C6t4')">
</div>
</div>
<!-- QR Scanner UI Overlay -->
<div class="relative z-10 w-full h-full flex flex-col items-center justify-between py-12 px-margin-mobile">
<!-- Instructions Card -->
<div class="w-full max-w-md bg-surface-container-lowest/90 backdrop-blur-md p-6 rounded-xl border-b-2 border-primary-container shadow-lg">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-primary-fixed flex items-center justify-center">
<span class="material-symbols-outlined text-primary">qr_code_2</span>
</div>
<div>
<h2 class="font-headline-md text-headline-md text-primary leading-tight">Scan to Attend</h2>
<p class="font-body-md text-on-surface-variant">Point your camera at the session QR code provided by your instructor.</p>
</div>
</div>
</div>
<!-- Viewfinder Section -->
<div class="relative w-72 h-72 md:w-80 md:h-80 flex items-center justify-center">
<!-- Corner Guides -->
<div class="absolute top-0 left-0 corner-guide border-t-4 border-l-4 rounded-tl-lg"></div>
<div class="absolute top-0 right-0 corner-guide border-t-4 border-r-4 rounded-tr-lg"></div>
<div class="absolute bottom-0 left-0 corner-guide border-b-4 border-l-4 rounded-bl-lg"></div>
<div class="absolute bottom-0 right-0 corner-guide border-b-4 border-r-4 rounded-br-lg"></div>
<!-- Scanning Animation Visual -->
<div class="absolute w-[90%] scanning-line"></div>
<!-- Middle Text Hint -->
<div class="bg-primary/20 text-primary-fixed px-4 py-2 rounded-full font-label-lg backdrop-blur-sm border border-primary-fixed/30">
                    Align QR Code
                </div>
</div>
<!-- Action Controls -->
<div class="flex flex-col items-center gap-6 w-full max-w-md">
<div class="flex gap-4">
<button class="w-16 h-16 rounded-full bg-surface-container-lowest/80 backdrop-blur-md flex items-center justify-center border border-outline-variant text-primary hover:bg-primary-container hover:text-white transition-colors duration-200 shadow-md">
<span class="material-symbols-outlined text-[32px]">flashlight_on</span>
</button>
<button class="w-16 h-16 rounded-full bg-surface-container-lowest/80 backdrop-blur-md flex items-center justify-center border border-outline-variant text-primary hover:bg-primary-container hover:text-white transition-colors duration-200 shadow-md">
<span class="material-symbols-outlined text-[32px]">image</span>
</button>
</div>
<!-- Secondary Info -->
<div class="bg-secondary-container/90 backdrop-blur-sm px-6 py-3 rounded-full border border-secondary text-secondary font-label-lg">
                    Current Course: Introduction to Botany
                </div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center h-20 px-margin-mobile bg-surface-container rounded-t-xl shadow-lg shadow-primary/10">
<a class="flex flex-col items-center justify-center text-on-surface-variant px-5 py-1 hover:bg-surface-variant transition-colors duration-200" href="#">
<span class="material-symbols-outlined">home</span>
<span class="font-label-lg text-label-lg">Home</span>
</a>
<a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-5 py-1 Active: scale-95 transition-transform duration-150" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">qr_code_scanner</span>
<span class="font-label-lg text-label-lg">Scan QR</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant px-5 py-1 hover:bg-surface-variant transition-colors duration-200" href="#">
<span class="material-symbols-outlined">person</span>
<span class="font-label-lg text-label-lg">Profile</span>
</a>
</nav>
<!-- Spacer for Bottom Nav -->
<div class="h-20 w-full"></div>
